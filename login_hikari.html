<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Hikari Apps</title>
    <!-- Google Fonts: Manrope -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        hikari: {
                            bg: '#071A3C',      // 深いネイビー
                            accent: '#B5F24D',  // ライムグリーン
                            text: '#FFFFFF',    // ダーク背景用テキスト
                            dark: '#111827',    // 入力フォーム内テキスト
                        }
                    },
                    fontFamily: {
                        sans: ['"Manrope"', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        body {
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        .input-transition {
            transition: all 0.2s ease-in-out;
        }
    </style>
</head>
<body class="bg-hikari-bg text-hikari-text flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md">
        
        <!-- ロゴエリア -->
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-12 h-12 rounded-lg bg-white/10 mb-4">
                <svg class="w-6 h-6 text-hikari-accent" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                </svg>
            </div>
            <h1 class="text-xl font-bold tracking-tight text-white">Hikari Apps</h1>
        </div>

        <!-- ログインカード（装飾を削ぎ落としシンプルに） -->
        <div class="bg-white/5 rounded-2xl p-6 sm:p-8">
            <form class="space-y-5" onsubmit="event.preventDefault();">
                
                <!-- Email -->
                <div>
                    <label for="email" class="block text-xs font-medium text-white/60 mb-1.5 uppercase tracking-wider">Email</label>
                    <input type="email" id="email" 
                        class="w-full px-4 py-3 bg-white/10 text-white border border-transparent rounded-lg focus:bg-white/20 focus:ring-1 focus:ring-hikari-accent focus:outline-none input-transition placeholder-white/30" 
                        placeholder="you@example.com">
                </div>

                <!-- Password -->
                <div>
                    <div class="flex items-center justify-between mb-1.5">
                        <label for="password" class="block text-xs font-medium text-white/60 uppercase tracking-wider">Password</label>
                        <a href="#" class="text-xs text-hikari-accent hover:text-white transition-colors">お忘れですか？</a>
                    </div>
                    <input type="password" id="password" 
                        class="w-full px-4 py-3 bg-white/10 text-white border border-transparent rounded-lg focus:bg-white/20 focus:ring-1 focus:ring-hikari-accent focus:outline-none input-transition placeholder-white/30" 
                        placeholder="••••••••">
                </div>

                <!-- Submit Button -->
                <button type="submit" 
                    class="w-full bg-hikari-accent text-hikari-dark font-bold py-3.5 px-4 rounded-lg hover:bg-white transition-all duration-200">
                    ログイン
                </button>
            </form>

            <!-- Divider -->
            <div class="my-6 relative flex justify-center text-sm">
                <span class="px-2 bg-transparent text-white/30 text-xs">または</span>
            </div>

            <!-- Social Login (1列に変更してMicrosoftを追加) -->
            <div class="space-y-3">
                <!-- Google -->
                <button class="w-full flex items-center justify-center px-4 py-3 border border-white/10 rounded-lg bg-white/5 hover:bg-white/10 transition-colors text-sm font-medium text-white">
                    <svg class="h-5 w-5 mr-3" fill="currentColor" viewBox="0 0 24 24">
                        <path d="M12.48 10.92v3.28h7.84c-.24 1.84-.853 3.187-1.787 4.133-1.147 1.147-2.933 2.4-6.053 2.4-4.827 0-8.6-3.893-8.6-8.72s3.773-8.72 8.6-8.72c2.6 0 4.507 1.027 5.907 2.347l2.307-2.307C18.747 1.44 16.133 0 12.48 0 5.867 0 .307 5.387.307 12s5.56 12 12.173 12c3.573 0 6.267-1.173 8.373-3.36 2.16-2.16 2.84-5.213 2.84-7.667 0-.76-.053-1.467-.173-2.053H12.48z"/>
                    </svg>
                    Google で続ける
                </button>

                <!-- GitHub -->
                <button class="w-full flex items-center justify-center px-4 py-3 border border-white/10 rounded-lg bg-white/5 hover:bg-white/10 transition-colors text-sm font-medium text-white">
                    <svg class="h-5 w-5 mr-3" fill="currentColor" viewBox="0 0 24 24">
                        <path fill-rule="evenodd" d="M12 2C6.477 2 2 6.484 2 12.017c0 4.425 2.865 8.18 6.839 9.504.5.092.682-.217.682-.483 0-.237-.008-.868-.013-1.703-2.782.605-3.369-1.343-3.369-1.343-.454-1.158-1.11-1.466-1.11-1.466-.908-.62.069-.608.069-.608 1.003.07 1.531 1.032 1.531 1.032.892 1.53 2.341 1.088 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.113-4.555-4.951 0-1.093.39-1.988 1.029-2.688-.103-.253-.446-1.272.098-2.65 0 0 .84-.27 2.75 1.026A9.564 9.564 0 0112 6.844c.85.004 1.705.115 2.504.337 1.909-1.296 2.747-1.027 2.747-1.027.546 1.379.202 2.398.1 2.651.64.7 1.028 1.595 1.028 2.688 0 3.848-2.339 4.695-4.566 4.943.359.309.678.92.678 1.855 0 1.338-.012 2.419-.012 2.747 0 .268.18.58.688.482A10.019 10.019 0 0022 12.017C22 6.484 17.522 2 12 2z" clip-rule="evenodd"/>
                    </svg>
                    GitHub で続ける
                </button>

                <!-- Microsoft (新規追加) -->
                <button class="w-full flex items-center justify-center px-4 py-3 border border-white/10 rounded-lg bg-white/5 hover:bg-white/10 transition-colors text-sm font-medium text-white">
                    <svg class="h-5 w-5 mr-3" viewBox="0 0 23 23" fill="currentColor">
                        <path d="M1 1h10v10H1zM12 1h10v10H12zM1 12h10v10H1zM12 12h10v10H12z"/>
                    </svg>
                    Microsoft で続ける
                </button>
            </div>
        </div>

        <!-- フッター -->
        <p class="text-center mt-8 text-sm text-white/40">
            <a href="#" class="hover:text-white transition-colors">新規アカウント作成</a>
        </p>
    </div>

</body>
</html>
