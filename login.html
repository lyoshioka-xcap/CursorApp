<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gate of Adventure - RPG Login</title>
    <!-- Google Fonts: Cinzel (ファンタジー風), Zen Old Mincho (日本語) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Zen+Old+Mincho:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            /* 配色パレット: ダークファンタジー / 魔王城 */
            --bg-color: #0f0f1a;
            --bg-gradient-start: #1a1a2e;
            --bg-gradient-end: #16213e;
            
            --card-bg: rgba(20, 20, 30, 0.85);
            --card-border: #ffd700; /* 金色 */
            
            --text-main: #e0e0e0; /* 古びた紙の文字 */
            --text-accent: #ffd700; /* 金色 */
            --text-muted: #8b9bb4;
            
            --input-bg: #0f0f1a;
            --input-border: #4a5568;
            --input-focus: #ffd700;
            
            --btn-primary-bg: linear-gradient(135deg, #4a00e0 0%, #8e2de2 100%); /* 魔法の輝き */
            --btn-primary-hover: linear-gradient(135deg, #5b10f0 0%, #9f3ef3 100%);
            --btn-border: #c0c0c0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cinzel', 'Zen Old Mincho', serif; /* ファンタジーフォント */
        }

        body {
            background-color: var(--bg-color);
            background-image: 
                radial-gradient(circle at 20% 20%, rgba(74, 0, 224, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 80%, rgba(142, 45, 226, 0.15) 0%, transparent 40%),
                repeating-linear-gradient(45deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 2px, transparent 2px, transparent 4px); /* 網目状のテクスチャ */
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
            overflow: hidden;
        }

        /* 浮遊するパーティクル（魔法の粉） */
        .magic-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--text-accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--text-accent);
            animation: float 10s infinite linear;
            opacity: 0.3;
        }
        @keyframes float {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.6; }
            100% { transform: translateY(-100px) scale(1); opacity: 0; }
        }

        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 2rem;
            position: relative;
            z-index: 10;
        }

        .login-card {
            background: var(--card-bg);
            padding: 3rem 2.5rem;
            border: 2px solid var(--card-border); /* 金の枠線 */
            border-radius: 8px; /* 少し角ばらせる */
            box-shadow: 
                0 0 20px rgba(255, 215, 0, 0.1), /* 内なる光 */
                0 20px 50px rgba(0, 0, 0, 0.8), /* 影 */
                inset 0 0 30px rgba(0, 0, 0, 0.8); /* 古びた質感 */
            backdrop-filter: blur(5px);
            position: relative;
        }

        /* 四隅の装飾 */
        .corner-decoration {
            position: absolute;
            width: 20px;
            height: 20px;
            border: 2px solid var(--text-accent);
            transition: all 0.3s ease;
        }
        .top-left { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .top-right { top: -2px; right: -2px; border-left: none; border-bottom: none; }
        .bottom-left { bottom: -2px; left: -2px; border-right: none; border-top: none; }
        .bottom-right { bottom: -2px; right: -2px; border-left: none; border-top: none; }

        .login-card:hover .corner-decoration {
            width: 30px;
            height: 30px;
            box-shadow: 0 0 10px var(--text-accent);
        }

        .brand-logo {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-bottom: 2rem;
            color: var(--text-accent);
        }

        .brand-logo i {
            font-size: 3rem;
            margin-bottom: 0.5rem;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.5);
        }

        .brand-logo span {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            background: linear-gradient(to bottom, #ffd700, #b8860b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 1.2rem;
            font-weight: 400;
            color: var(--text-main);
            margin-bottom: 0.5rem;
            letter-spacing: 1px;
        }

        .header p {
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-accent);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper i {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1rem;
            transition: all 0.3s;
        }

        .form-control {
            width: 100%;
            padding: 0.8rem 1rem 0.8rem 3rem;
            background-color: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 4px;
            font-size: 0.9rem;
            color: var(--text-main);
            transition: all 0.3s;
            outline: none;
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.5);
        }

        .form-control:focus {
            border-color: var(--input-focus);
            box-shadow: 0 0 10px rgba(255, 215, 0, 0.2), inset 0 2px 5px rgba(0,0,0,0.5);
        }

        .form-control:focus + i {
            color: var(--text-accent);
            text-shadow: 0 0 5px var(--text-accent);
        }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            font-size: 0.8rem;
        }

        .remember-me {
            display: flex;
            align-items: center;
            cursor: pointer;
            color: var(--text-muted);
        }

        .remember-me input {
            margin-right: 0.5rem;
            accent-color: var(--text-accent);
            width: 1rem;
            height: 1rem;
        }

        .forgot-password {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.2s;
            border-bottom: 1px dashed var(--text-muted);
        }

        .forgot-password:hover {
            color: var(--text-accent);
            border-color: var(--text-accent);
        }

        .btn-submit {
            width: 100%;
            padding: 1rem;
            background: var(--btn-primary-bg);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 4px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
        }

        /* ボタンの輝きエフェクト */
        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.4), transparent);
            transition: 0.5s;
        }

        .btn-submit:hover {
            background: var(--btn-primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 0 20px rgba(142, 45, 226, 0.6);
            border-color: var(--text-accent);
        }

        .btn-submit:hover::before {
            left: 100%;
        }

        .btn-submit:active {
            transform: scale(0.98);
        }

        .divider {
            display: flex;
            align-items: center;
            margin: 2rem 0;
            color: var(--text-muted);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--input-border), transparent);
        }

        .divider span {
            padding: 0 1rem;
        }

        .social-login {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
        }

        .btn-social {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 0.7rem;
            background-color: rgba(255,255,255,0.05);
            border: 1px solid var(--input-border);
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .btn-social:hover {
            background-color: rgba(255,255,255,0.1);
            border-color: var(--text-main);
            color: var(--text-main);
        }

        .btn-social i {
            margin-right: 0.5rem;
            font-size: 1rem;
        }

        .signup-link {
            text-align: center;
            margin-top: 2rem;
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .signup-link a {
            color: var(--text-accent);
            text-decoration: none;
            font-weight: 700;
            margin-left: 0.5rem;
            position: relative;
        }
        
        .signup-link a::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -2px;
            left: 0;
            background-color: var(--text-accent);
            transition: width 0.3s;
        }

        .signup-link a:hover::after {
            width: 100%;
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 2rem 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- 魔法のパーティクル背景 -->
    <div class="magic-particle" style="left: 10%; animation-duration: 8s;"></div>
    <div class="magic-particle" style="left: 30%; animation-duration: 12s; animation-delay: 2s;"></div>
    <div class="magic-particle" style="left: 70%; animation-duration: 10s; animation-delay: 1s;"></div>
    <div class="magic-particle" style="left: 90%; animation-duration: 15s; animation-delay: 4s;"></div>

    <div class="login-container">
        <div class="login-card">
            <!-- 四隅の装飾 -->
            <div class="corner-decoration top-left"></div>
            <div class="corner-decoration top-right"></div>
            <div class="corner-decoration bottom-left"></div>
            <div class="corner-decoration bottom-right"></div>

            <div class="brand-logo">
                <i class="fa-solid fa-dragon"></i>
                <span>Gate of Quest</span>
            </div>
            
            <div class="header">
                <h1>Adventurer's Entry</h1>
                <p>冒険の書（アカウント）を開く</p>
            </div>

            <form action="#" method="POST" onsubmit="event.preventDefault(); alert('ギルドへのログインを確認しました。');">
                <div class="form-group">
                    <label for="email">Adventurer ID (Email)</label>
                    <div class="input-wrapper">
                        <input type="email" id="email" class="form-control" placeholder="hero@guild.com" required>
                        <i class="fa-solid fa-scroll"></i>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Secret Spell (Password)</label>
                    <div class="input-wrapper">
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                        <i class="fa-solid fa-key"></i>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember-me">
                        <input type="checkbox">
                        <span>魂を刻む (Remember)</span>
                    </label>
                    <a href="#" class="forgot-password">呪文を忘れた？</a>
                </div>

                <button type="submit" class="btn-submit">
                    冒険を始める
                </button>

                <div class="divider">
                    <span>Or Summon With</span>
                </div>

                <div class="social-login">
                    <button type="button" class="btn-social">
                        <i class="fa-brands fa-google"></i>
                        Google
                    </button>
                    <button type="button" class="btn-social">
                        <i class="fa-brands fa-github"></i>
                        GitHub
                    </button>
                </div>
            </form>

            <div class="signup-link">
                まだギルド未登録ですか？
                <a href="#">冒険者登録</a>
            </div>
        </div>
    </div>
</body>
</html>
